<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>精算Tool</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f8fc; color: #333; min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; padding: 0 0 100px; }
.header { background: #fff; border-bottom: 0.5px solid #eee; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
.header-title { font-size: 17px; font-weight: 500; }
.header-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 4px; }
.period-bar { background: #fff; padding: 12px 16px; border-bottom: 0.5px solid #eee; }
.period-tabs { display: flex; gap: 8px; margin-bottom: 10px; }
.period-tab { flex: 1; padding: 7px; border: 0.5px solid #ddd; border-radius: 8px; background: none; font-size: 13px; cursor: pointer; color: #666; }
.period-tab.active { background: #e6f1fb; border-color: #378add; color: #185fa5; font-weight: 500; }
.month-selector { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.month-selector select { flex: 1; padding: 8px 10px; border: 0.5px solid #eee; border-radius: 8px; background: #f7f8fc; font-size: 14px; color: #333; }
.event-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
.event-row input { flex: 1; min-width: 80px; padding: 8px 10px; border: 0.5px solid #eee; border-radius: 8px; background: #f7f8fc; font-size: 14px; color: #333; }
.event-row select { flex: 1; min-width: 80px; padding: 8px 10px; border: 0.5px solid #eee; border-radius: 8px; background: #f7f8fc; font-size: 14px; color: #333; }
.btn-sm { padding: 7px 12px; border: 0.5px solid #ddd; border-radius: 8px; background: none; font-size: 13px; cursor: pointer; color: #333; white-space: nowrap; }
.btn-sm:hover { background: #f7f8fc; }
.btn-sm.danger { color: #e24b4a; border-color: #f0c0c0; }
.section-label { font-size: 12px; color: #aaa; margin: 10px 0 6px; }
.member-select-row { display: flex; flex-wrap: wrap; gap: 6px; }
.member-check { padding: 5px 10px; border: 0.5px solid #ddd; border-radius: 20px; background: none; font-size: 12px; cursor: pointer; color: #666; }
.member-check.active { background: #e6f1fb; border-color: #378add; color: #185fa5; font-weight: 500; }
.expense-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
.expense-card { background: #fff; border: 0.5px solid #eee; border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
.expense-card:hover { background: #f7f8fc; }
.expense-icon { width: 36px; height: 36px; border-radius: 8px; background: #f7f8fc; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.expense-main { flex: 1; min-width: 0; }
.expense-top { display: flex; justify-content: space-between; align-items: baseline; }
.expense-store { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
.expense-amount { font-size: 15px; font-weight: 500; }
.expense-sub { display: flex; gap: 6px; margin-top: 2px; flex-wrap: wrap; }
.expense-tag { font-size: 11px; color: #888; background: #f7f8fc; padding: 1px 6px; border-radius: 10px; }
.fab-area { position: fixed; bottom: 24px; right: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 20; }
.fab { width: 52px; height: 52px; border-radius: 50%; color: #fff; border: none; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.fab-main { background: #378add; }
.fab-camera { background: #fff; border: 0.5px solid #ddd; color: #378add; font-size: 22px; width: 44px; height: 44px; }
.cam-menu { position: fixed; bottom: 100px; right: 16px; background: #fff; border: 0.5px solid #eee; border-radius: 12px; overflow: hidden; z-index: 30; box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
.cam-menu-item { padding: 13px 20px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-bottom: 0.5px solid #eee; }
.cam-menu-item:last-child { border-bottom: none; }
.cam-menu-item:hover { background: #f7f8fc; }
.cam-overlay { position: fixed; inset: 0; z-index: 25; }
.seisan-btn { display: block; margin: 0 16px; background: #fff; border: 0.5px solid #ddd; border-radius: 12px; padding: 12px 16px; width: calc(100% - 32px); font-size: 14px; cursor: pointer; color: #333; text-align: center; }
.seisan-result { margin: 12px 16px; background: #e6f1fb; border: 0.5px solid #b5d4f4; border-radius: 12px; padding: 14px 16px; }
.seisan-result h3 { font-size: 14px; font-weight: 500; color: #185fa5; margin-bottom: 10px; }
.seisan-item { font-size: 14px; color: #185fa5; margin-bottom: 4px; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: flex-end; justify-content: center; z-index: 100; }
.modal { background: #fff; border-radius: 20px 20px 0 0; padding: 20px 16px 32px; width: 100%; max-width: 480px; max-height: 92vh; overflow-y: auto; }
.modal h2 { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
.modal-sub { font-size: 12px; color: #aaa; margin-bottom: 14px; }
.modal-close { float: right; background: none; border: none; font-size: 20px; cursor: pointer; color: #888; }
.form-label { font-size: 13px; color: #888; margin-bottom: 5px; display: block; }
.form-input { width: 100%; padding: 10px 12px; border: 0.5px solid #eee; border-radius: 8px; font-size: 15px; background: #f7f8fc; color: #333; margin-bottom: 14px; }
.form-input:focus { outline: none; border-color: #378add; }
.cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
.cat-btn { padding: 10px 4px; border: 0.5px solid #eee; border-radius: 8px; background: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 11px; color: #666; }
.cat-btn.active { border-color: #378add; background: #e6f1fb; color: #185fa5; }
.cat-icon { font-size: 20px; line-height: 1; display: block; }
.payer-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.payer-btn { flex: 1; min-width: 60px; padding: 9px; border: 0.5px solid #eee; border-radius: 8px; background: none; font-size: 13px; cursor: pointer; color: #666; }
.payer-btn.active { border-color: #378add; background: #e6f1fb; color: #185fa5; font-weight: 500; }
.split-toggle { display: flex; gap: 8px; margin-bottom: 12px; }
.split-btn { flex: 1; padding: 8px; border: 0.5px solid #eee; border-radius: 8px; background: none; font-size: 13px; cursor: pointer; color: #666; }
.split-btn.active { border-color: #378add; background: #e6f1fb; color: #185fa5; font-weight: 500; }
.slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.slider-name { font-size: 13px; min-width: 60px; color: #333; }
.slider-pct { font-size: 13px; min-width: 36px; text-align: right; font-weight: 500; color: #333; }
.btn-submit { width: 100%; padding: 13px; background: #378add; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 4px; }
.btn-delete { width: 100%; padding: 11px; background: none; color: #e24b4a; border: 0.5px solid #f0c0c0; border-radius: 12px; font-size: 14px; cursor: pointer; margin-top: 8px; }
.ocr-preview { width: 100%; border-radius: 10px; max-height: 200px; object-fit: contain; background: #f7f8fc; margin-bottom: 12px; border: 0.5px solid #eee; }
.ocr-loading { text-align: center; padding: 20px; color: #888; font-size: 14px; }
.spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #ddd; border-top-color: #378add; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.btn-ocr-run { width: 100%; padding: 11px; background: #6366f1; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; margin-bottom: 14px; }
.ocr-badge { display: inline-block; background: #e0e7ff; color: #4338ca; font-size: 11px; padding: 2px 7px; border-radius: 6px; margin-bottom: 10px; }
.divider { border: none; border-top: 0.5px solid #eee; margin: 14px 0; }
.member-tag { display: inline-flex; align-items: center; gap: 5px; background: #f7f8fc; border: 0.5px solid #eee; border-radius: 20px; padding: 5px 10px; margin: 3px; font-size: 13px; }
.member-del { background: none; border: none; color: #aaa; cursor: pointer; font-size: 14px; padding: 0 0 0 2px; }
.member-add-row { display: flex; gap: 8px; margin-top: 10px; }
.member-add-row input { flex: 1; padding: 9px 12px; border: 0.5px solid #eee; border-radius: 8px; font-size: 14px; background: #f7f8fc; color: #333; }
.empty { text-align: center; padding: 40px 20px; color: #aaa; font-size: 14px; }
input[type=file] { display: none; }
</style>
</head>
<body>
<div class="app" id="app"></div>
<input type="file" id="fileCamera" accept="image/*" capture="environment">
<input type="file" id="fileUpload" accept="image/*">
<script>
const CATS=[{id:"rent",label:"家賃",icon:"🏠"},{id:"daily",label:"日用品",icon:"🧴"},{id:"food",label:"食費",icon:"🍽️"},{id:"fun",label:"娯楽費",icon:"🎮"},{id:"util",label:"光熱費",icon:"💡"},{id:"trans",label:"交通費",icon:"🚃"},{id:"med",label:"医療費",icon:"💊"},{id:"comm",label:"通信費",icon:"📱"},{id:"other",label:"その他",icon:"📦"}];

let state={
  allMembers:JSON.parse(localStorage.getItem('allMembers')||'["自分","パートナー"]'),
  periodMembers:JSON.parse(localStorage.getItem('periodMembers')||'{}'),
  mode:'month',year:new Date().getFullYear(),month:new Date().getMonth()+1,
  eventName:'',events:JSON.parse(localStorage.getItem('events')||'[]'),selectedEvent:'',
  expenses:JSON.parse(localStorage.getItem('expenses')||'[]'),
  showForm:false,showSettings:false,showSeisan:false,showCamMenu:false,showOCR:false,
  editId:null,ocrImage:null,ocrMime:'image/jpeg',ocrLoading:false,ocrDone:false,
  form:{date:today(),amount:'',cat:'food',store:'',payer:'',splitMode:'equal',splits:{}},
  newMember:''
};

function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function saveAll(){localStorage.setItem('allMembers',JSON.stringify(state.allMembers));}
function savePM(){localStorage.setItem('periodMembers',JSON.stringify(state.periodMembers));}
function saveExp(){localStorage.setItem('expenses',JSON.stringify(state.expenses));}
function saveEv(){localStorage.setItem('events',JSON.stringify(state.events));}

function currentKey(){if(state.mode==='event')return 'event:'+state.selectedEvent;return state.year+'-'+String(state.month).padStart(2,'0');}
function currentMembers(){const k=currentKey();if(state.periodMembers[k]&&state.periodMembers[k].length>0)return state.periodMembers[k];return[...state.allMembers];}
function togglePeriodMember(name){const k=currentKey();let m=state.periodMembers[k]?[...state.periodMembers[k]]:[...state.allMembers];if(m.includes(name)){if(m.length<=1)return;m=m.filter(x=>x!==name);}else m.push(name);state.periodMembers[k]=m;savePM();render();}
function filteredExp(){return state.expenses.filter(e=>e.key===currentKey());}
function initSplits(members){const m=members||currentMembers();const n=m.length,base=Math.floor(100/n),rem=100-base*n;const s={};m.forEach((name,i)=>s[name]=base+(i===0?rem:0));return s;}
function calcSeisan(expenses,members){const bal={};members.forEach(m=>bal[m]=0);expenses.forEach(e=>{const amt=Number(e.amount);Object.entries(e.splits).forEach(([m,pct])=>{if(bal[m]!==undefined)bal[m]-=amt*pct/100;});if(bal[e.payer]!==undefined)bal[e.payer]+=amt;});const pos=[],neg=[];Object.entries(bal).forEach(([m,v])=>{if(v>0.5)pos.push({m,v});else if(v<-0.5)neg.push({m,v:-v});});const res=[],pc=pos.map(x=>({...x})),nc=neg.map(x=>({...x}));let i=0,j=0;while(i<pc.length&&j<nc.length){const pay=Math.min(pc[i].v,nc[j].v);res.push(nc[j].m+' → '+pc[i].m+' に ¥'+Math.round(pay).toLocaleString());pc[i].v-=pay;nc[j].v-=pay;if(pc[i].v<0.5)i++;if(nc[j].v<0.5)j++;}return res;}

function buildSplit(form,members){
  if(form.splitMode==='equal'){const pct=members.length>0?Math.round(100/members.length):0;return '<div style="font-size:13px;color:#888;margin-bottom:14px;">'+members.map(m=>'<span style="margin-right:8px;">'+m+': '+pct+'%</span>').join('')+'</div>';}
  const total=Object.values(form.splits).reduce((a,b)=>a+b,0);
  return '<div style="margin-bottom:14px;">'+members.map(m=>{const pct=form.splits[m]!==undefined?form.splits[m]:0;return '<div class="slider-row"><span class="slider-name">'+m+'</span><input type="range" min="0" max="100" step="1" value="'+pct+'" style="flex:1;" oninput="adjustSplit(\''+m+'\',+this.value);render()"><span class="slider-pct">'+pct+'%</span></div>';}).join('')+'<div style="font-size:12px;color:'+(total===100?'#3b6d11':'#e24b4a')+';">合計: '+total+'%</div></div>';
}

function buildForm(f,members,isEdit,isOCR){
  return '<label class="form-label">日付</label><input class="form-input" type="date" value="'+f.date+'" onchange="state.form.date=this.value">'+
    '<label class="form-label">金額</label><input class="form-input" type="number" placeholder="0" value="'+f.amount+'" oninput="state.form.amount=this.value" inputmode="numeric">'+
    '<label class="form-label">カテゴリ</label><div class="cat-grid">'+CATS.map(c=>'<button class="cat-btn'+(f.cat===c.id?' active':'')+'" onclick="state.form.cat=\''+c.id+'\';render()"><span class="cat-icon">'+c.icon+'</span>'+c.label+'</button>').join('')+'</div>'+
    '<label class="form-label">支出先</label><input class="form-input" placeholder="スーパー、Netflix..." value="'+f.store+'" oninput="state.form.store=this.value">'+
    '<label class="form-label">支払った人</label><div class="payer-row">'+members.map(m=>'<button class="payer-btn'+(f.payer===m?' active':'')+'" onclick="state.form.payer=\''+m+'\';render()">'+m+'</button>').join('')+'</div>'+
    '<label class="form-label">按分</label><div class="split-toggle"><button class="split-btn'+(f.splitMode==='equal'?' active':'')+'" onclick="state.form.splitMode=\'equal\';state.form.splits=initSplits();render()">均等</button><button class="split-btn'+(f.splitMode==='custom'?' active':'')+'" onclick="state.form.splitMode=\'custom\';render()">カスタム</button></div>'+
    buildSplit(f,members)+
    '<button class="btn-submit" onclick="'+(isOCR?'addFromOCR()':isEdit?'saveEdit()':'addExpense()')+'">'+(isOCR?'登録する':isEdit?'保存する':'追加する')+'</button>'+
    (isEdit?'<button class="btn-delete" onclick="delExpenseFromForm()">この支出を削除</button>':'');
}

function render(){
  const app=document.getElementById('app');
  const members=currentMembers();
  const exps=filteredExp();

  let periodHTML='';
  if(state.mode==='month'){
    const years=[2024,2025,2026,2027],months=Array.from({length:12},(_,i)=>i+1);
    periodHTML='<div class="month-selector"><select onchange="state.year=+this.value;state.showSeisan=false;render()">'+years.map(y=>'<option value="'+y+'"'+(y===state.year?' selected':'')+'>'+y+'年</option>').join('')+'</select><select onchange="state.month=+this.value;state.showSeisan=false;render()">'+months.map(m=>'<option value="'+m+'"'+(m===state.month?' selected':'')+'>'+m+'月</option>').join('')+'</select></div>';
  }else{
    const opts=state.events.map(ev=>'<option value="'+ev.id+'"'+(ev.id===state.selectedEvent?' selected':'')+'>'+ev.name+'</option>').join('');
    periodHTML='<div class="event-row"><select onchange="state.selectedEvent=this.value;state.showSeisan=false;render()">'+( opts||'<option value="">イベントなし</option>')+'</select><input placeholder="イベント名" value="'+state.eventName+'" oninput="state.eventName=this.value" style="flex:1;min-width:80px;padding:8px 10px;border:0.5px solid #eee;border-radius:8px;background:#f7f8fc;font-size:14px;color:#333;"><button class="btn-sm" onclick="addEvent()">作成</button>'+(state.selectedEvent?'<button class="btn-sm danger" onclick="delEvent()">削除</button>':'')+' </div>';
  }

  const msel='<div><div class="section-label">参加メンバー</div><div class="member-select-row">'+state.allMembers.map(m=>'<button class="member-check'+(members.includes(m)?' active':'')+'" onclick="togglePeriodMember(\''+m+'\')">'+m+'</button>').join('')+'</div></div>';

  let expHTML=exps.length===0?'<div class="empty">まだ支出がありません</div>':exps.slice().reverse().map(e=>{const cat=CATS.find(c=>c.id===e.cat)||CATS[8];return '<div class="expense-card" onclick="openEdit(\''+e.id+'\')"><div class="expense-icon">'+cat.icon+'</div><div class="expense-main"><div class="expense-top"><span class="expense-store">'+(e.store||cat.label)+'</span><span class="expense-amount">¥'+Number(e.amount).toLocaleString()+'</span></div><div class="expense-sub"><span class="expense-tag">'+e.date.slice(5)+'</span><span class="expense-tag">'+e.payer+'が支払</span><span class="expense-tag">'+cat.label+'</span></div></div><span style="font-size:16px;color:#ccc;flex-shrink:0;">›</span></div>';}).join('');

  let seisanHTML='';
  if(state.showSeisan){const res=calcSeisan(exps,members);seisanHTML='<div class="seisan-result"><h3>精算結果</h3>'+(res.length?res.map(r=>'<div class="seisan-item">'+r+'</div>').join(''):'<div class="seisan-item">精算不要です</div>')+'</div>';}

  let modal='';
  if(state.showForm){const f=state.form,isEdit=!!state.editId,fm=members.length>0?members:state.allMembers;if(!f.payer||!fm.includes(f.payer))f.payer=fm[0]||'';if(Object.keys(f.splits).length===0)f.splits=initSplits(fm);modal='<div class="overlay" onclick="if(event.target===this){state.showForm=false;state.editId=null;render()}"><div class="modal"><button class="modal-close" onclick="state.showForm=false;state.editId=null;render()">✕</button><h2>'+(isEdit?'支出を編集':'支出を追加')+'</h2><div style="height:10px;"></div>'+buildForm(f,fm,isEdit,false)+'</div></div>';}

  let ocrModal='';
  if(state.showOCR){const f=state.form,fm=members.length>0?members:state.allMembers;if(!f.payer||!fm.includes(f.payer))f.payer=fm[0]||'';if(Object.keys(f.splits).length===0)f.splits=initSplits(fm);const imgSrc=state.ocrImage?'data:'+state.ocrMime+';base64,'+state.ocrImage:'';ocrModal='<div class="overlay" onclick="if(event.target===this){state.showOCR=false;render()}"><div class="modal"><button class="modal-close" onclick="state.showOCR=false;render()">✕</button><h2>領収書から読み取り</h2><p class="modal-sub">Claudeが自動入力します。確認して登録してください。</p>'+(imgSrc?'<img class="ocr-preview" src="'+imgSrc+'" alt="領収書">':'')+(state.ocrLoading?'<div class="ocr-loading"><span class="spinner"></span>読み取り中...</div>':'')+(!state.ocrLoading&&!state.ocrDone?'<button class="btn-ocr-run" onclick="runOCR()">📖 AIで読み取る</button>':'')+(state.ocrDone?'<span class="ocr-badge">✨ 読み取り完了 — 修正してから登録</span><hr class="divider">'+buildForm(f,fm,false,true):'')+'</div></div>';}

  let settingsModal='';
  if(state.showSettings){settingsModal='<div class="overlay" onclick="if(event.target===this){state.showSettings=false;render()}"><div class="modal"><button class="modal-close" onclick="state.showSettings=false;render()">✕</button><h2>メンバー設定</h2><p style="font-size:12px;color:#aaa;margin-bottom:10px;">全期間で使うメンバーを管理します</p><div style="margin-bottom:10px;">'+state.allMembers.map((m,i)=>'<span class="member-tag">'+m+'<button class="member-del" onclick="delMember('+i+')">✕</button></span>').join('')+'</div><div class="member-add-row"><input placeholder="名前を入力" value="'+state.newMember+'" oninput="state.newMember=this.value" onkeydown="if(event.key===\'Enter\')addMember()"><button class="btn-sm" onclick="addMember()">追加</button></div></div></div>';}

  let camMenu='';
  if(state.showCamMenu){camMenu='<div class="cam-overlay" onclick="state.showCamMenu=false;render()"></div><div class="cam-menu"><div class="cam-menu-item" onclick="state.showCamMenu=false;render();document.getElementById(\'fileCamera\').click()"><span style="font-size:20px;">📷</span>カメラで撮影</div><div class="cam-menu-item" onclick="state.showCamMenu=false;render();document.getElementById(\'fileUpload\').click()"><span style="font-size:20px;">🖼️</span>写真から選択</div></div>';}

  app.innerHTML='<div class="header"><span class="header-title">精算Tool</span><button class="header-btn" onclick="state.showSettings=true;render()">⚙️</button></div>'+
    '<div class="period-bar"><div class="period-tabs"><button class="period-tab'+(state.mode==='month'?' active':'')+'" onclick="state.mode=\'month\';state.showSeisan=false;render()">月次</button><button class="period-tab'+(state.mode==='event'?' active':'')+'" onclick="state.mode=\'event\';state.showSeisan=false;render()">イベント</button></div>'+periodHTML+msel+'</div>'+
    '<div class="expense-list">'+expHTML+'</div>'+
    '<button class="seisan-btn" onclick="state.showSeisan=!state.showSeisan;render()">'+(state.showSeisan?'精算を閉じる':'精算を見る →')+'</button>'+
    seisanHTML+
    '<div class="fab-area"><button class="fab fab-camera" onclick="state.showCamMenu=!state.showCamMenu;render()" title="領収書読み取り">📷</button><button class="fab fab-main" onclick="openForm()">+</button></div>'+
    camMenu+modal+ocrModal+settingsModal;
}

function setupFileInputs(){
  ['fileCamera','fileUpload'].forEach(id=>{
    document.getElementById(id).addEventListener('change',e=>{
      const file=e.target.files[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=ev=>{
        state.ocrImage=ev.target.result.split(',')[1];state.ocrMime=file.type||'image/jpeg';
        state.ocrDone=false;state.ocrLoading=false;state.showOCR=true;
        const m=currentMembers();state.form={date:today(),amount:'',cat:'food',store:'',payer:m[0]||'',splitMode:'equal',splits:initSplits(m)};
        e.target.value='';render();
      };
      reader.readAsDataURL(file);
    });
  });
}

async function runOCR(){
  if(!state.ocrImage)return;
  state.ocrLoading=true;render();
  const prompt='この領収書の画像から情報を読み取り、JSONのみ返してください。\n{"date":"YYYY-MM-DD","amount":数値,"store":"店名","category":"food/daily/rent/fun/util/trans/med/comm/other","note":"補足"}\nカテゴリ: food=飲食, daily=日用品, trans=交通, util=光熱費, comm=通信, med=医療, fun=娯楽, rent=家賃, other=その他';
  try{
    const res = await fetch('/api/ocr', {method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ image: state.ocrImage, mime: state.ocrMime })});
    const parsed = await res.json();
    state.form.date=parsed.date||today();
    state.form.amount=parsed.amount||'';
    state.form.store=parsed.store||'';
if(CATS.find(c=>c.id===parsed.category))state.form.cat=parsed.category;
    state.ocrDone=true;
  }catch(e){alert('読み取りに失敗しました。もう一度お試しください。');console.error(e);}
  state.ocrLoading=false;render();
}

function addFromOCR(){addExpense();state.showOCR=false;state.ocrImage=null;state.ocrDone=false;}
function openForm(){const m=currentMembers();state.showForm=true;state.editId=null;state.form={date:today(),amount:'',cat:'food',store:'',payer:m[0]||'',splitMode:'equal',splits:initSplits(m)};render();}
function openEdit(id){const e=state.expenses.find(x=>x.id===id);if(!e)return;state.showForm=true;state.editId=id;state.form={date:e.date,amount:e.amount,cat:e.cat,store:e.store||'',payer:e.payer,splitMode:'custom',splits:{...e.splits}};render();}
function addExpense(){const f=state.form;if(!f.amount||!f.payer)return;const m=currentMembers();let splits={};if(f.splitMode==='equal'){const n=m.length,base=Math.floor(100/n),rem=100-base*n;m.forEach((x,i)=>splits[x]=base+(i===0?rem:0));}else splits={...f.splits};state.expenses.push({id:Date.now().toString(),key:currentKey(),date:f.date,amount:f.amount,cat:f.cat,store:f.store,payer:f.payer,splits});saveExp();state.showForm=false;state.showSeisan=false;render();}
function saveEdit(){const f=state.form;if(!f.amount||!f.payer)return;const m=currentMembers();let splits={};if(f.splitMode==='equal'){const n=m.length,base=Math.floor(100/n),rem=100-base*n;m.forEach((x,i)=>splits[x]=base+(i===0?rem:0));}else splits={...f.splits};state.expenses=state.expenses.map(e=>e.id!==state.editId?e:{...e,date:f.date,amount:f.amount,cat:f.cat,store:f.store,payer:f.payer,splits});saveExp();state.showForm=false;state.editId=null;state.showSeisan=false;render();}
function delExpenseFromForm(){if(!confirm('この支出を削除しますか？'))return;state.expenses=state.expenses.filter(e=>e.id!==state.editId);saveExp();state.showForm=false;state.editId=null;render();}
function adjustSplit(name,val){const m=currentMembers();const others=m.filter(x=>x!==name);const rem=100-val,base=Math.floor(rem/others.length),r=rem-base*others.length;state.form.splits[name]=val;others.forEach((x,i)=>state.form.splits[x]=base+(i===0?r:0));}
function addMember(){const name=state.newMember.trim();if(!name||state.allMembers.includes(name))return;state.allMembers.push(name);state.newMember='';saveAll();render();}
function delMember(i){if(state.allMembers.length<=1)return;if(!confirm('「'+state.allMembers[i]+'」を削除しますか？'))return;state.allMembers.splice(i,1);saveAll();render();}
function addEvent(){const name=state.eventName.trim();if(!name)return;const ev={id:Date.now().toString(),name};state.events.push(ev);state.selectedEvent=ev.id;state.eventName='';saveEv();render();}
function delEvent(){if(!state.selectedEvent)return;const ev=state.events.find(e=>e.id===state.selectedEvent);if(!confirm('「'+(ev?ev.name:'')+'」を削除しますか？'))return;state.events=state.events.filter(e=>e.id!==state.selectedEvent);state.expenses=state.expenses.filter(e=>e.key!=='event:'+state.selectedEvent);state.selectedEvent=state.events[0]?.id||'';saveExp();saveEv();render();}

render();
setupFileInputs();
</script>
